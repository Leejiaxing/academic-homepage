<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Academic Homepage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <div class="hero-grid">
        <div class="hero-text">
          <h1 id="name">Jiaxing Li</h1>
          <p class="role" id="role">PhD Candidate</p>
          <p class="intro" id="intro"></p>
          <nav aria-label="Primary">
            <a href="#about">About</a>
            <a href="#research">Research</a>
            <a href="#publications">Publications</a>
            <a href="#contact">Contact</a>
          </nav>
        </div>
        <div class="hero-photo-wrap">
          <img id="profile-photo" class="hero-photo" src="assets/profile-photo.svg" alt="Profile photo" />
        </div>
      </div>
    </div>
  </header>

  <main>
    <section id="about" class="section">
      <h2>About</h2>
      <p id="about-text"></p>
    </section>

    <section id="research" class="section">
      <h2>Research Interests</h2>
      <ul id="research-list"></ul>
    </section>

    <section id="publications" class="section">
      <h2>Selected Publications</h2>
      <p class="muted">Edit publication entries and links in <code>site-data.json</code>.</p>
      <ul id="publications-list" class="publications-list"></ul>
    </section>

    <section id="contact" class="section">
      <h2>Contact</h2>
      <ul id="contact-list" class="contact-list"></ul>
    </section>
  </main>

  <footer>
    <p id="footer-text"></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
